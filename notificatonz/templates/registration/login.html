{% extends 'registration/base.html' %}

{% block title %}Login - Comms Platform{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-5">
        <div class="card mt-5">
            <div class="card-body p-4">
                <div class="text-center mb-4">
                    <div class="login-icon mb-3">
                        <i class="fas fa-paper-plane"></i>
                    </div>
                    <h3 class="fw-bold">Welcome Back</h3>
                    <p class="text-muted">Sign in to your account</p>
                </div>
                <form method="post">
                    {% csrf_token %}
                    <div class="mb-3">
                        <label class="form-label fw-medium">Username</label>
                        <div class="input-group">
                            <span class="input-group-text bg-light border-end-0">
                                <i class="fas fa-user text-muted"></i>
                            </span>
                            <input type="text" name="username" class="form-control border-start-0" placeholder="Enter your username" required>
                        </div>
                    </div>
                    <div class="mb-4">
                        <label class="form-label fw-medium">Password</label>
                        <div class="input-group">
                            <span class="input-group-text bg-light border-end-0">
                                <i class="fas fa-lock text-muted"></i>
                            </span>
                            <input type="password" name="password" class="form-control border-start-0" placeholder="Enter your password" required>
                        </div>
                    </div>
                    <button type="submit" class="btn btn-primary w-100 py-2">
                        <i class="fas fa-sign-in-alt me-2"></i>Sign In
                    </button>
                </form>
                <p class="text-center mt-4 mb-0">
                    Don't have an account? 
                    <a href="{% url 'signup' %}" class="text-decoration-none fw-medium">Sign up</a>
                </p>
            </div>
        </div>
    </div>
</div>

<style>
.login-icon {
    width: 70px;
    height: 70px;
    background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
    border-radius: 16px;
    display: inline-flex;
    align-items: center;
    justify-content: center;
    font-size: 1.8rem;
    color: white;
    box-shadow: 0 8px 25px rgba(102, 126, 234, 0.4);
}
.input-group-text {
    border-radius: 10px 0 0 10px;
    border: 2px solid #e2e8f0;
    border-right: none;
}
.form-control {
    border-radius: 0 10px 10px 0;
}
</style>
{% endblock %}
